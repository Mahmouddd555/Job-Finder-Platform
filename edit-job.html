<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <script src="js/common.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <meta charset="UTF-8">
    <title>Edit Job</title>
</head>

<body>
    <!-- Navigation Bar -->

    <header>
        <nav>
            <div class="nav-container">
                <div class="logo">
                    <a href="index.html">🎯 Job Finder</a>
                </div>
                <div class="nav-links">
                    <a href="admin_dashboard.html"> Admin Dashboard |</a>
                    <a href="admin-jobs.html"> Manage Jobs |</a>
                </div>
                <div id="authArea" class="auth">
                    <a href="login.html" class="login">Login |</a>
                    <a href="signup.html" class="signup"> Sign Up</a>
                </div>
            </div>
        </nav>
    </header>

    <h1> Edit Job</h1> <br>

    <form action="#" method="post" style="width: 100%; margin: auto;">

        <!-- Job Details -->

        <label for="job-id">Job ID: </label>
        <input type="text" id="job-id" name="job-id" disabled style="width: 21%;"><br>

        <label for="job-title">Job Title: </label>
        <input type="text" id="job-title" name="job-title" required style="width: 30%;"><br>

        <label for="salary">Salary: </label>
        <input type="number" id="salary" name="salary" required style="width: 30%;"><br>

        <label for="company">Company: </label>
        <input type="text" id="company" name="company" required style="width: 30%;"><br>

        <label for="job-status">Job Status: </label>
        <select id="job-status" name="job-status" style="width: 15%;">
            <option value="open">Open</option>
            <option value="closed">Closed</option>
        </select><br>

        <label for="description">Job Description: </label><br>
        <textarea id="description" name="description" rows="4" cols="50" required></textarea>

        <input type="submit" value="Update Job">
    </form>

        <footer class="footer">

                <!-- About -->
                <div class="footer-section">
                    <h3>Job Finder</h3>

                </div>

                </div>

            </div>

            <div class="footer-bottom">
                <p>© 2026 Job Finder. All rights reserved.</p>
            </div>

        </footer>
</body>

</html>
