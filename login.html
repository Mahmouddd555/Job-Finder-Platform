<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link rel="stylesheet" href="style/style2.css">
    <script src="js/login.js" defer></script>
    <script src="js/common.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

    <center>
        <h1>Login</h1>
<form id="loginForm">
    <label>Username:</label><br>
    <input type="text" id="username" required><br><br>
    <label>Password:</label><br>
    <input type="password" id="password" required><br><br>
    <input type="submit" value="Login">
    
    <p id="r" style="text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.1);">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </p>
</form>
    <footer class="footer">

        <div class="footer-container">

            <!-- About -->
            <div class="footer-section">
                <h3>Job Finder</h3>
                <p>Find your dream job with ease</p>
            </div>

            <!-- Contact -->
            <div class="footer-section">
                <h3>Contact</h3>
                <p><i class="fas fa-envelope"></i> email@example.com</p>
                <p><i class="fas fa-phone"></i> +1 234 567 890</p>
            </div>

            <!-- Social -->
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 Job Finder. All rights reserved.</p>
        </div>

    </footer>
</body>

</html>
