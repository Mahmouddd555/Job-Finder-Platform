<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Job Details</title>

  <link rel="stylesheet" href="style/style2.css">
  <script src="js/job-details.js" defer></script>
  <script src="js/common.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

  <nav>
    <div class="nav-container">
      <div class="logo">
        <a href="index.html">🎯 Job Finder</a>
      </div>
      <div class="nav-links">
        <a href="job-Search.html">Search Jobs |</a>
        <a href="my-applications.html" class="user-only"> My Applications |</a>
        <a href="applied_jobs.html" class="admin-only"> Candidates |</a>
        <a href="admin_dashboard.html" class="admin-only"> Admin Dashboard |</a>
        <a href="admin-jobs.html" class="admin-only"> Admin Jobs |</a>
      </div>
      <div id="authArea" class="auth">
        <a href="login.html" class="login">Login | </a>
        <a href="signup.html" class="signup"> Sign Up</a>
      </div>
    </div>
  </nav>
  <section class="job-details-container">
    <div class="job-details-wrapper">

      <!-- الصورة والتفاصيل الأساسية -->
      <div class="job-details-header">
        <div class="job-details-info">
          <h1 id="title"></h1>
          <p id="company"></p>
          <p id="salary"></p>
          <p id="status"></p>
        </div>
        <img id="job-image" class="job-details-image" alt="Job Image">
      </div>

      <!-- الوصف -->
      <div class="job-details-section">
        <h2><i class="fas fa-align-left"></i> Description</h2>
        <p id="description"></p>
      </div>

      <!-- نموذج التقديم -->
      <div class="job-details-section">
        <h2><i class="fas fa-paper-plane"></i> Apply Now</h2>
        <form id="applyForm">
          <input type="text" name="fullname" placeholder="Full Name" required>
          <input type="email" name="email" placeholder="Email" required>
          <input type="number" name="experience" placeholder="Years of Experience" required>
          <button type="submit">Submit Application</button>
        </form>
      </div>

    </div>
  </section>
  <footer class="footer">

    <div class="footer-container">

      <!-- About -->
      <div class="footer-section">
        <h3>Job Finder</h3>
        <p>Find your dream job with ease</p>
      </div>

      <!-- Contact -->
      <div class="footer-section">
        <h3>Contact</h3>
        <p><i class="fas fa-envelope"></i> email@example.com</p>
        <p><i class="fas fa-phone"></i> +1 234 567 890</p>
      </div>

      <!-- Social -->
      <div class="footer-section">
        <h3>Follow Us</h3>
        <div class="social-icons">
          <a href="#"><i class="fab fa-facebook"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 Job Finder. All rights reserved.</p>
    </div>

  </footer>
</body>

</html>
