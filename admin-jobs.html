<!DOCTYPE html>
<html>

<head>
    <title>Admin Jobs</title>
    <link rel="stylesheet" href="style/style2.css">
    <script src="js/admin-jobs.js" defer></script>
    <script src="js/common.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">🎯 Job Finder</a>
            </div>
            <div class="nav-links">
                <a href="applied_jobs.html"> Candidates |</a>
                <a href="admin_dashboard.html"> Admin Dashboard |</a>
            </div>
            <div id="authArea" class="auth">
                <a href="login.html" class="login">Login | </a>
                <a href="signup.html" class="signup"> Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="table-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
            <h2 style="margin: 0;">Available Jobs</h2>
            <a href="add-job.html" class="btn-main"
                style="text-decoration: none; background: #007bff; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold;">
                <i class="fas fa-plus"></i> Add New Job
            </a>
        </div>

        <table id="jobsTable">
        </table>

        <div class="manage-id-section"
            style="margin-top: 40px; text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <h3>Manage Job by ID</h3>
            <div style="margin: 20px 0;">
                <input type="number" id="jobIdInput" placeholder="Enter Job ID">
            </div>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button onclick="editJobById(document.getElementById('jobIdInput').value)" class="btn-action edit-link">
                    Edit Job
                </button>
                <button onclick="deleteJobById(document.getElementById('jobIdInput').value)"
                    class="btn-action delete-link">Delete Job
                </button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3>Job Finder</h3>
                <p>Find your dream job with ease</p>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <p><i class="fas fa-envelope"></i> email@example.com</p>
                <p><i class="fas fa-phone"></i> +1 234 567 890</p>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Job Finder. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
