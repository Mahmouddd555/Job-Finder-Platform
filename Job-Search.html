<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>User Job Search</title>
    <link rel="stylesheet" href="style/style2.css">
    <script src="js/search.js"></script>
    <script src="js/common.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <!-- ========== NAVIGATION BAR ========== -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">🎯 Job Finder</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home |</a>
                <a href="applied_jobs.html" class="admin-only">Candidates |</a>
                <a href="my-applications.html" z class="user-only"> My Applications |</a>
                <a href="admin_dashboard.html" class="admin-only"> Admin Dashboard |</a>
                <a href="admin-jobs.html" class="admin-only"> Admin Jobs |</a>
            </div>
            <div id="authArea" class="auth">
                <a href="login.html" class="login">Login |</a>
                <a href="signup.html" class="signup"> Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Hero Search Section -->
    <div class="hero-search-section">
        <div class="hero-search-container">
            <h1 class="search-title">🔍 Find Your Dream Job</h1>
            <div class="search-box">
                <input type="text" id="search" placeholder="Search by job title, company, category...">
                <button id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </div>
    </div>

    <!-- Jobs Results Container -->
    <div class="jobs-list-container">
        <div class="jobs-header">
            <h2><i class="fas fa-briefcase"></i> All Jobs</h2>
            <button onclick="showAllJobs()" class="reset-btn">
                <i class="fas fa-sync-alt"></i> Show All
            </button>
        </div>
        <div id="jobsContainer" class="jobs-container">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading jobs...
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-section">
                <h3>Job Finder</h3>
                <p>Find your dream job with ease</p>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <p><i class="fas fa-envelope"></i> email@example.com</p>
                <p><i class="fas fa-phone"></i> +1 234 567 890</p>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Job Finder. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
